server:
  host: 127.0.0.1
  port: 8787

api:
  # Set to a non-empty string to require this key via the X-API-Key header
  # on the /api/v1/parent/history endpoint.
  parent_history_api_key: ""
  # Optional API key protection for /api/v1/maxi/turn
  turn_api_key: ""
  # 0 disables rate limiting
  max_turns_per_minute: 30

storage:
  data_dir: ./data
  text_retention_days: 30
  delete_audio_after_turn: true

stt:
  engine: faster-whisper
  model: small
  language: de
  vad: true
  max_audio_seconds: 20
  max_upload_bytes: 20971520  # 20 MB
  # Optional command template, e.g.: whisper "{input}" --model {model} --language {language} --output_format txt --output_dir "{output_dir}"
  command: ""

tts:
  engine: piper
  voice: de_DE-friendly
  output_format: m4a
  speaking_rate: 0.92
  # Optional command template, must create file at {output}; {text} contains the answer
  command: ""

ocr:
  language: deu  # Tesseract language code (deu for German)
  max_image_bytes: 10485760  # 10 MB

agent:
  # Optional HTTP endpoint for real agent responses
  endpoint: ""
  api_key: ""
  timeout_seconds: 20

modes:
  explain:
    description: Sachfragen kindgerecht erklären
  story:
    description: Kurze Geschichten erzählen
  dino:
    description: Dinosauriermodus
  football:
    description: Fußball und Bewegung
  bedtime:
    description: ruhige kurze Antworten
