server:
  host: 0.0.0.0
  port: 8787

storage:
  data_dir: ./data
  text_retention_days: 30
  delete_audio_after_turn: true

stt:
  engine: faster-whisper
  model: small
  language: de
  vad: true
  max_audio_seconds: 20

tts:
  engine: piper
  voice: de_DE-friendly
  output_format: m4a
  speaking_rate: 0.92

modes:
  explain:
    description: Sachfragen kindgerecht erklären
  story:
    description: Kurze Geschichten erzählen
  dino:
    description: Dinosauriermodus
  football:
    description: Fußball und Bewegung
  bedtime:
    description: ruhige kurze Antworten
